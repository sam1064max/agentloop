version: '3.8'
services:
  api:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      - DATABASE_URL=postgresql://agentloop:agentloop@db:5432/agentloop
    depends_on:
      - db
      - analytics
  
  analytics:
    build: ./analytics
    ports: ["8001:8001"]
    environment:
      - DUCKDB_PATH=/data/analytics.db
    volumes:
      - analytics-data:/data
  
  frontend:
    build: ./frontend
    ports: ["8080:80"]
    depends_on:
      - api

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=agentloop
      - POSTGRES_PASSWORD=agentloop
      - POSTGRES_DB=agentloop
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports: ["5432:5432"]

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
  
  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    volumes:
      - ./infrastructure/grafana:/etc/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  postgres-data:
  analytics-data: