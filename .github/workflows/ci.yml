name: CI
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lint
        run: |
          # Python lint
          pip install ruff
          ruff check backend/
          # JS lint
          npm install eslint
          npm run lint --prefix frontend/
  
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          # Backend tests
          pip install pytest pytest-cov
          pytest backend/tests/ --cov=backend/app --cov-report=xml
          # Frontend tests
          npm test --prefix frontend/ -- --coverage
  
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker build -t agentloop-api ./backend
          docker build -t agentloop-analytics ./analytics
          docker build -t agentloop-frontend ./frontend

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*